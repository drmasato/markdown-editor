<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<!-- OGP -->
<meta name="description" content="インストール不要のブラウザ完結型Markdownエディタ。リアルタイムプレビュー・ファイル読み込み・自動保存対応。">
<meta property="og:title" content="Markdown Editor">
<meta property="og:description" content="インストール不要のブラウザ完結型Markdownエディタ。リアルタイムプレビュー・ファイル読み込み・自動保存対応。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://drmasato.github.io/markdown-editor/">
<meta property="og:image" content="https://drmasato.github.io/markdown-editor/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Markdown Editor">
<meta name="twitter:description" content="インストール不要のブラウザ完結型Markdownエディタ。リアルタイムプレビュー・ファイル読み込み・自動保存対応。">
<meta name="twitter:image" content="https://drmasato.github.io/markdown-editor/ogp.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #181825;
    border-bottom: 1px solid #313244;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #cba6f7;
    letter-spacing: 0.05em;
  }

  .toolbar {
    display: flex;
    gap: 6px;
  }

  .toolbar button {
    background: #313244;
    border: none;
    color: #cdd6f4;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .toolbar button:hover { background: #45475a; }

  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane-label {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6c7086;
    background: #181825;
    border-bottom: 1px solid #313244;
  }

  #editor {
    flex: 1;
    background: #1e1e2e;
    color: #cdd6f4;
    border: none;
    border-right: 1px solid #313244;
    padding: 20px;
    font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: none;
    outline: none;
    tab-size: 2;
  }

  #preview {
    flex: 1;
    padding: 20px 28px;
    overflow-y: auto;
    background: #1e1e2e;
    line-height: 1.75;
  }

  /* Markdown preview styles */
  #preview h1, #preview h2, #preview h3,
  #preview h4, #preview h5, #preview h6 {
    color: #cba6f7;
    margin: 1.2em 0 0.5em;
    font-weight: 600;
    line-height: 1.3;
  }
  #preview h1 { font-size: 1.8em; border-bottom: 1px solid #313244; padding-bottom: 0.3em; }
  #preview h2 { font-size: 1.4em; border-bottom: 1px solid #313244; padding-bottom: 0.2em; }
  #preview h3 { font-size: 1.15em; }

  #preview p { margin: 0.7em 0; }

  #preview a { color: #89b4fa; text-decoration: none; }
  #preview a:hover { text-decoration: underline; }

  #preview code {
    background: #313244;
    color: #a6e3a1;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "JetBrains Mono", monospace;
    font-size: 0.88em;
  }

  #preview pre {
    background: #11111b;
    border: 1px solid #313244;
    border-radius: 8px;
    padding: 14px 18px;
    overflow-x: auto;
    margin: 1em 0;
  }

  #preview pre code {
    background: none;
    padding: 0;
    color: #a6e3a1;
    font-size: 13px;
  }

  #preview blockquote {
    border-left: 3px solid #cba6f7;
    margin: 1em 0;
    padding: 4px 16px;
    color: #a6adc8;
    background: #181825;
    border-radius: 0 6px 6px 0;
  }

  #preview ul, #preview ol {
    padding-left: 1.6em;
    margin: 0.6em 0;
  }

  #preview li { margin: 0.3em 0; }

  #preview table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
  }

  #preview th, #preview td {
    border: 1px solid #45475a;
    padding: 8px 12px;
    text-align: left;
  }

  #preview th {
    background: #313244;
    color: #cba6f7;
    font-weight: 600;
  }

  #preview tr:nth-child(even) { background: #181825; }

  #preview hr {
    border: none;
    border-top: 1px solid #45475a;
    margin: 1.5em 0;
  }

  #preview img { max-width: 100%; border-radius: 6px; }

  .divider {
    width: 4px;
    background: #313244;
    cursor: col-resize;
    transition: background 0.15s;
  }
  .divider:hover { background: #cba6f7; }

  .status {
    font-size: 11px;
    color: #6c7086;
    padding: 6px 14px;
    background: #181825;
    border-top: 1px solid #313244;
    display: flex;
    gap: 16px;
  }

  .status span { color: #a6adc8; }

  #file-input { display: none; }

  .btn-open {
    background: #45475a !important;
    color: #cba6f7 !important;
    border: 1px solid #cba6f7 !important;
  }
  .btn-open:hover { background: #585b70 !important; }

  /* Drag-over overlay */
  #editor.dragover {
    background: #2a2a3e;
    border: 2px dashed #cba6f7;
  }

  #drop-hint {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(30,30,46,0.88);
    color: #cba6f7;
    font-size: 18px;
    font-weight: 600;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .editor-wrap {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Auto-save toast */
  #toast {
    position: fixed;
    bottom: 36px;
    right: 20px;
    background: #a6e3a1;
    color: #1e1e2e;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* Full-page drop overlay */
  #page-drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(203,166,247,0.12);
    border: 3px dashed #cba6f7;
    z-index: 200;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: #cba6f7;
    letter-spacing: 0.06em;
    pointer-events: none;
  }

  /* Scroll sync active indicator */
  .sync-on { color: #a6e3a1 !important; }
</style>
</head>
<body>

<header>
  <h1>Markdown Editor</h1>
  <div class="toolbar">
    <button onclick="insertMd('**', '**')"><b>B</b></button>
    <button onclick="insertMd('*', '*')"><i>I</i></button>
    <button onclick="insertMd('`', '`')">Code</button>
    <button onclick="insertMd('\n```\n', '\n```')">Block</button>
    <button onclick="insertLine('## ')">H2</button>
    <button onclick="insertLine('- ')">List</button>
    <button class="btn-open" onclick="document.getElementById('file-input').click()">ファイルを開く</button>
    <button onclick="copyHtml()">HTML コピー</button>
    <button onclick="downloadMd()" title="Cmd+S / Ctrl+S">保存</button>
    <button id="sync-btn" onclick="toggleSync()" title="スクロール同期">同期: ON</button>
  </div>
  <input type="file" id="file-input" accept=".md,.txt,.markdown">
</header>

<div id="page-drop-overlay">ファイルをドロップして開く</div>
<div id="toast">自動保存しました</div>

<div class="main">
  <div class="pane">
    <div class="pane-label" id="editor-label">Editor</div>
    <div class="editor-wrap">
      <div id="drop-hint">ここにファイルをドロップ</div>
    <textarea id="editor" spellcheck="false" placeholder="# ここにMarkdownを入力...

**太字**, *斜体*, `コード`

- リスト項目
- リスト項目

> 引用文

```python
print('Hello, World!')
```

| 列1 | 列2 |
|-----|-----|
| A   | B   |
"></textarea>
    </div>
  </div>

  <div class="divider" id="divider"></div>

  <div class="pane">
    <div class="pane-label">Preview</div>
    <div id="preview"></div>
  </div>
</div>

<div class="status" id="status">
  <span id="chars">文字数: 0</span>
  <span id="lines">行数: 1</span>
  <span id="words">単語数: 0</span>
  <span id="filename"></span>
</div>

<script>
  const editor  = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const toast   = document.getElementById('toast');
  const syncBtn = document.getElementById('sync-btn');
  const pageOverlay = document.getElementById('page-drop-overlay');

  marked.setOptions({ breaks: true, gfm: true });

  // ── 2. localStorage 自動保存 ──────────────────────────────────────
  const STORAGE_KEY = 'md-editor-content';
  let saveTimer = null;
  let toastTimer = null;

  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      localStorage.setItem(STORAGE_KEY, editor.value);
      showToast();
    }, 800);
  }

  function showToast() {
    clearTimeout(toastTimer);
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ── レンダリング ───────────────────────────────────────────────────
  function render() {
    const text = editor.value;
    preview.innerHTML = marked.parse(text);
    const lines = text.split('\n').length;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    document.getElementById('chars').textContent = `文字数: ${text.length}`;
    document.getElementById('lines').textContent = `行数: ${lines}`;
    document.getElementById('words').textContent = `単語数: ${words}`;
    scheduleSave();
  }

  editor.addEventListener('input', render);

  // ── 1. スクロール同期 ──────────────────────────────────────────────
  let syncScroll = true;
  let syncingFromEditor = false;

  function toggleSync() {
    syncScroll = !syncScroll;
    syncBtn.textContent = `同期: ${syncScroll ? 'ON' : 'OFF'}`;
    syncBtn.classList.toggle('sync-on', syncScroll);
  }

  editor.addEventListener('scroll', () => {
    if (!syncScroll || syncingFromEditor) return;
    const ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
    syncingFromEditor = true;
    preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
    requestAnimationFrame(() => { syncingFromEditor = false; });
  });

  // ── 4. キーボードショートカット ──────────────────────────────────
  editor.addEventListener('keydown', e => {
    const mod = e.metaKey || e.ctrlKey;

    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart, en = editor.selectionEnd;
      editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(en);
      editor.selectionStart = editor.selectionEnd = s + 2;
      render();
      return;
    }
    if (mod && e.key === 's') { e.preventDefault(); downloadMd(); return; }
    if (mod && e.key === 'b') { e.preventDefault(); insertMd('**', '**'); return; }
    if (mod && e.key === 'i') { e.preventDefault(); insertMd('*', '*'); return; }
    if (mod && e.key === 'k') { e.preventDefault(); insertMd('`', '`'); return; }
  });

  // ── ツールバー操作 ─────────────────────────────────────────────────
  function insertMd(before, after) {
    const s = editor.selectionStart, e = editor.selectionEnd;
    const sel = editor.value.substring(s, e) || 'テキスト';
    editor.value = editor.value.substring(0, s) + before + sel + after + editor.value.substring(e);
    editor.selectionStart = s + before.length;
    editor.selectionEnd = s + before.length + sel.length;
    editor.focus();
    render();
  }

  function insertLine(prefix) {
    const s = editor.selectionStart;
    const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
    editor.value = editor.value.substring(0, lineStart) + prefix + editor.value.substring(lineStart);
    editor.selectionStart = editor.selectionEnd = lineStart + prefix.length;
    editor.focus();
    render();
  }

  function copyHtml() {
    navigator.clipboard.writeText(preview.innerHTML).then(() => alert('HTMLをコピーしました'));
  }

  function downloadMd() {
    const name = document.getElementById('filename').dataset.name || 'document.md';
    const blob = new Blob([editor.value], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
  }

  // ── ファイル読み込み ───────────────────────────────────────────────
  function loadFile(file) {
    if (!file) return;
    if (!/\.(md|txt|markdown)$/i.test(file.name)) {
      alert('.md / .txt / .markdown ファイルのみ読み込めます');
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      editor.value = ev.target.result;
      render();
      const fn = document.getElementById('filename');
      fn.textContent = file.name;
      fn.dataset.name = file.name;
      document.getElementById('editor-label').textContent = 'Editor — ' + file.name;
    };
    reader.readAsText(file, 'UTF-8');
  }

  document.getElementById('file-input').addEventListener('change', e => {
    loadFile(e.target.files[0]);
    e.target.value = '';
  });

  // ── 3. ドラッグ&ドロップ（全画面対応）────────────────────────────
  const editorWrap = document.querySelector('.editor-wrap');
  const dropHint   = document.getElementById('drop-hint');
  let dragDepth = 0;

  document.addEventListener('dragenter', e => {
    e.preventDefault();
    dragDepth++;
    pageOverlay.style.display = 'flex';
  });
  document.addEventListener('dragover', e => { e.preventDefault(); });
  document.addEventListener('dragleave', () => {
    dragDepth--;
    if (dragDepth <= 0) { dragDepth = 0; pageOverlay.style.display = 'none'; }
  });
  document.addEventListener('drop', e => {
    e.preventDefault();
    dragDepth = 0;
    pageOverlay.style.display = 'none';
    loadFile(e.dataTransfer.files[0]);
  });

  // エディタペイン内の独自オーバーレイ（残存）
  editorWrap.addEventListener('dragenter', e => {
    e.stopPropagation();
    dropHint.style.display = 'flex';
    editor.classList.add('dragover');
  });
  editorWrap.addEventListener('dragleave', e => {
    if (!editorWrap.contains(e.relatedTarget)) {
      dropHint.style.display = 'none';
      editor.classList.remove('dragover');
    }
  });
  editorWrap.addEventListener('drop', e => {
    dropHint.style.display = 'none';
    editor.classList.remove('dragover');
  });

  // ── リサイズ ──────────────────────────────────────────────────────
  const divider = document.getElementById('divider');
  let resizing = false;
  divider.addEventListener('mousedown', () => resizing = true);
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const main = document.querySelector('.main');
    const rect = main.getBoundingClientRect();
    const pct = ((e.clientX - rect.left) / rect.width) * 100;
    const panes = document.querySelectorAll('.pane');
    panes[0].style.flex = 'none';
    panes[0].style.width = Math.max(20, Math.min(80, pct)) + '%';
    panes[1].style.flex = '1';
  });
  document.addEventListener('mouseup', () => resizing = false);

  // ── 初期化 ────────────────────────────────────────────────────────
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) editor.value = saved;
  syncBtn.classList.add('sync-on');
  render();
</script>
</body>
</html>
